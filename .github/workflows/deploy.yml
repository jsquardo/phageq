name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/phageq
            git pull

  deploy:
    runs-on: ubuntu-latest
    needs: sync
    if: |
      contains(toJson(github.event.commits), 'phageq-site/src') ||
      contains(toJson(github.event.commits), 'phageq-site/public') ||
      contains(toJson(github.event.commits), 'phageq-site/astro.config')
    steps:
      - name: Build and restart site
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/phageq/phageq-site
            npm run build
            pm2 restart phageq-site