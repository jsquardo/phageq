name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'phageq-site/src/**'
      - 'phageq-site/public/**'
      - 'phageq-site/astro.config.mjs'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/phageq
            git pull
            cd phageq-site
            npm run build
            pm2 restart phageq-site